<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#b91c1c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Arc rings (web / cross-platform layer) -->
  <path d="M 22 78 A 46 46 0 0 0 98 58"  fill="none" stroke="url(#webGrad)" stroke-width="7" stroke-linecap="round"/>
  <path d="M 10 55 A 56 56 0 0 0 88 96"  fill="none" stroke="url(#webGrad)" stroke-width="7" stroke-linecap="round"/>
  <path d="M 25 24 A 50 50 0 0 0 30 100" fill="none" stroke="url(#webGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- Diamond spark (Rust core) -->
  <path d="M 80 8 Q 80 42 114 42 Q 80 42 80 76 Q 80 42 46 42 Q 80 42 80 8 Z"
        fill="url(#rustGrad)" filter="url(#shadow)"/>
  <!-- Inner highlight -->
  <path d="M 80 24 Q 80 42 98 42 Q 80 42 80 60 Q 80 42 62 42 Q 80 42 80 24 Z"
        fill="#facc15" opacity="0.75"/>
</svg>
