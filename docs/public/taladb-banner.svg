<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#b91c1c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g transform="translate(50, 20)">
    <path d="M 40 150 A 70 70 0 0 0 160 120" fill="none" stroke="url(#webGrad)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 20 110 A 85 85 0 0 0 150 170" fill="none" stroke="url(#webGrad)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 45 65 A 75 75 0 0 0 60 185" fill="none" stroke="url(#webGrad)" stroke-width="12" stroke-linecap="round"/>

    <path d="M 130 10 Q 130 60 190 60 Q 130 60 130 110 Q 130 60 70 60 Q 130 60 130 10 Z" fill="url(#rustGrad)" filter="url(#shadow)"/>
    <path d="M 130 35 Q 130 60 155 60 Q 130 60 130 85 Q 130 60 105 60 Q 130 60 130 35 Z" fill="#facc15" opacity="0.8"/>
  </g>

  <g transform="translate(260, 140)">
    <text font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="110" font-weight="800" letter-spacing="-2">
      <tspan fill="#1e293b">Tala</tspan><tspan fill="url(#rustGrad)">DB</tspan>
    </text>
    
    <text y="45" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#64748b" letter-spacing="3">
      LOCAL-FIRST NOSQL | RUST POWERED
    </text>
  </g>
</svg>
