name: CI

on:
  # Post-merge validation only. Feature/dev branches are covered by the
  # pull_request event below — running both would double every run.
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  # No paths-ignore here on purpose: `ci-pass` is the required status check in
  # branch protection, and a skipped workflow never reports one — a docs-only PR
  # would hang forever on "Waiting for status".
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# One run per PR (or per branch). A new push cancels the in-flight run for the
# same PR instead of queueing a second full matrix.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the cross-platform build matrix.
  #
  # macOS runners bill at 10x the Linux rate and Windows at 2x, so PRs build
  # Linux only. The full three-OS matrix runs post-merge on `main` (and on
  # manual dispatch), which is what gates releases anyway — `release.yml`
  # rebuilds every platform artifact from the tag.
  #
  # Trade-off: a Windows- or macOS-only compile break surfaces on `main`
  # rather than in the PR. Run the workflow manually (Actions → CI → Run
  # workflow) on a branch touching platform-specific code to check early.
  # ---------------------------------------------------------------------------
  setup:
    name: Setup — resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.matrix.outputs.node }}
      cli: ${{ steps.matrix.outputs.cli }}
    steps:
      - name: Pick matrix for ${{ github.event_name }}
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node='[{"os":"ubuntu-latest","artifact":"taladb-node-linux"}]'
            cli='[{"os":"ubuntu-latest","artifact":"taladb-linux-x86_64","bin":"taladb"}]'
          else
            node='[{"os":"ubuntu-latest","artifact":"taladb-node-linux"},{"os":"macos-latest","artifact":"taladb-node-macos"},{"os":"windows-latest","artifact":"taladb-node-windows"}]'
            cli='[{"os":"ubuntu-latest","artifact":"taladb-linux-x86_64","bin":"taladb"},{"os":"macos-latest","artifact":"taladb-macos-aarch64","bin":"taladb"},{"os":"windows-latest","artifact":"taladb-windows-x86_64","bin":"taladb.exe"}]'
          fi
          echo "node=$node" >> "$GITHUB_OUTPUT"
          echo "cli=$cli"   >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Lint & Test — native Rust (fast, no WASM toolchain needed)
  # ---------------------------------------------------------------------------
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # TypeScript type-check
  # ---------------------------------------------------------------------------
  ts-check:
    name: TypeScript — type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit (taladb)
        run: node_modules/.bin/tsc -p packages/clients/taladb/tsconfig.json --noEmit

      - name: tsc --noEmit (@taladb/react)
        run: node_modules/.bin/tsc -p packages/clients/react/tsconfig.json --noEmit

      - name: tsc --noEmit (@taladb/sync-mongodb)
        run: node_modules/.bin/tsc -p packages/adapters/mongodb/tsconfig.json --noEmit

      - name: tsc --noEmit (@taladb/next)
        run: node_modules/.bin/tsc -p packages/integrations/next/tsconfig.json --noEmit

  # ---------------------------------------------------------------------------
  # Validate — @taladb/cloudflare (JS-only, no build step)
  # ---------------------------------------------------------------------------
  validate-cloudflare:
    name: Validate — @taladb/cloudflare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package files exist
        run: |
          test -f packages/integrations/cloudflare/src/index.js  || (echo "Missing src/index.js"  && exit 1)
          test -f packages/integrations/cloudflare/src/index.d.ts || (echo "Missing src/index.d.ts" && exit 1)

      - name: tsc --noEmit (@taladb/cloudflare)
        run: node_modules/.bin/tsc -p packages/integrations/cloudflare/tsconfig.json --noEmit

  # ---------------------------------------------------------------------------
  # Build — WASM (wasm-pack)
  # ---------------------------------------------------------------------------
  build-wasm:
    name: Build — WASM
    runs-on: ubuntu-latest
    needs: rust-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM (release)
        run: wasm-pack build packages/bindings/web --target web --out-dir pkg --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: taladb-web-pkg
          path: packages/bindings/web/pkg/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — Node.js native module (napi-rs)
  # ---------------------------------------------------------------------------
  build-node:
    name: Build — Node.js (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [setup, rust-check]

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.node) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: node

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native module
        working-directory: packages/bindings/node
        run: pnpm build

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/bindings/node/*.node
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — CLI binary
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build — CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [setup, rust-check]

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.cli) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli

      - name: Build CLI (release)
        run: cargo build -p taladb-cli --release

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.bin }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — taladb TypeScript package (tsup)
  # ---------------------------------------------------------------------------
  build-taladb:
    name: Build — taladb (TS)
    runs-on: ubuntu-latest
    needs: [ts-check, build-node]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The sync e2e suite (tests/sync.e2e.test.ts) runs against the real
      # native engine — download the freshly built linux binary so it executes
      # instead of skipping. This is the suite that would have caught the
      # 0.8.4 sync regressions.
      - name: Download Node.js native module
        uses: actions/download-artifact@v4
        with:
          name: taladb-node-linux
          path: packages/bindings/node

      - name: Unit + e2e tests
        working-directory: packages/clients/taladb
        run: pnpm test

      - name: Build
        working-directory: packages/clients/taladb
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/clients/taladb
        run: ls dist/index.mjs dist/index.js dist/index.d.ts dist/index.react-native.mjs

  # ---------------------------------------------------------------------------
  # Test + Build — @taladb/react hooks package
  # ---------------------------------------------------------------------------
  build-taladb-react:
    name: Build — @taladb/react (TS)
    runs-on: ubuntu-latest
    needs: ts-check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit + integration tests
        working-directory: packages/clients/react
        run: pnpm test

      - name: Build
        working-directory: packages/clients/react
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/clients/react
        run: ls dist/index.mjs dist/index.js dist/index.d.ts

  # ---------------------------------------------------------------------------
  # Test + Build — @taladb/sync-mongodb adapter package
  # ---------------------------------------------------------------------------
  build-taladb-sync-mongodb:
    name: Build — @taladb/sync-mongodb (TS)
    runs-on: ubuntu-latest
    needs: ts-check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        working-directory: packages/adapters/mongodb
        run: pnpm test

      - name: Build
        working-directory: packages/adapters/mongodb
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/adapters/mongodb
        run: ls dist/index.mjs dist/index.js dist/index.d.ts

  # ---------------------------------------------------------------------------
  # Test + Build — @taladb/next (sync route handlers + SyncProvider)
  # ---------------------------------------------------------------------------
  build-taladb-next:
    name: Build — @taladb/next (TS)
    runs-on: ubuntu-latest
    needs: [ts-check, build-node]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # taladbSyncStore tests run against the real native engine.
      - name: Download Node.js native module
        uses: actions/download-artifact@v4
        with:
          name: taladb-node-linux
          path: packages/bindings/node

      - name: Unit tests (handlers + stores)
        working-directory: packages/integrations/next
        run: pnpm test

      - name: Build
        working-directory: packages/integrations/next
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/integrations/next
        run: ls dist/server.mjs dist/server.js dist/server.d.ts dist/client.mjs dist/client.js dist/client.d.ts

  # ---------------------------------------------------------------------------
  # Build — example Next.js app (real `next build` over the whole client stack:
  # taladb browser bundle, @taladb/web worker asset, @taladb/react provider,
  # @taladb/next server + client). Catches bundler-only regressions the unit
  # suites can't (e.g. webpack chasing @taladb/node into the browser bundle).
  # ---------------------------------------------------------------------------
  build-example-next:
    name: Build — examples/nextjs-sync (next build)
    runs-on: ubuntu-latest
    needs: ts-check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages the example consumes
        run: |
          pnpm --filter taladb exec tsup
          pnpm --filter @taladb/react exec tsup
          pnpm --filter @taladb/next exec tsup

      - name: next build
        working-directory: examples/nextjs-sync
        run: pnpm exec next build

  # ---------------------------------------------------------------------------
  # Publish gate — all jobs must pass before anything can be published.
  # Use this job as the required status check in branch protection rules
  # and as the `needs:` dependency in any publish/release workflow.
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI — all checks passed
    runs-on: ubuntu-latest
    needs:
      - setup
      - rust-check
      - ts-check
      - validate-cloudflare
      - build-wasm
      - build-node
      - build-cli
      - build-taladb
      - build-taladb-react
      - build-taladb-sync-mongodb
      - build-taladb-next
      - build-example-next
    if: always()
    steps:
      # Every job above runs unconditionally, so `skipped` here means an
      # upstream job failed and its dependents never ran — treat it as a
      # failure, otherwise the gate would go green on a broken run.
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled|skipped)"'; then
            echo "One or more required jobs failed, was cancelled, or was skipped."
            exit 1
          fi
          echo "All jobs passed — safe to publish."
