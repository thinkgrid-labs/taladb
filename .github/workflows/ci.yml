name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Test — native Rust (fast, no WASM toolchain needed)
  # ---------------------------------------------------------------------------
  rust-check:
    name: Rust — check / clippy / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # TypeScript type-check
  # ---------------------------------------------------------------------------
  ts-check:
    name: TypeScript — type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: tsc --noEmit (taladb)
        run: node_modules/.bin/tsc -p packages/taladb/tsconfig.json --noEmit

      - name: tsc --noEmit (@taladb/react)
        run: node_modules/.bin/tsc -p packages/taladb-react/tsconfig.json --noEmit

  # ---------------------------------------------------------------------------
  # Validate — @taladb/cloudflare (JS-only, no build step)
  # ---------------------------------------------------------------------------
  validate-cloudflare:
    name: Validate — @taladb/cloudflare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Verify package files exist
        run: |
          test -f packages/taladb-cloudflare/src/index.js  || (echo "Missing src/index.js"  && exit 1)
          test -f packages/taladb-cloudflare/src/index.d.ts || (echo "Missing src/index.d.ts" && exit 1)

      - name: tsc --noEmit (@taladb/cloudflare)
        run: node_modules/.bin/tsc -p packages/taladb-cloudflare/tsconfig.json --noEmit

  # ---------------------------------------------------------------------------
  # Build — WASM (wasm-pack)
  # ---------------------------------------------------------------------------
  build-wasm:
    name: Build — WASM
    runs-on: ubuntu-latest
    needs: rust-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (release)
        run: wasm-pack build packages/taladb-web --target web --out-dir pkg --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: taladb-web-pkg
          path: packages/taladb-web/pkg/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — Node.js native module (napi-rs)
  # ---------------------------------------------------------------------------
  build-node:
    name: Build — Node.js (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust-check

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: taladb-node-linux
          - os: macos-latest
            artifact: taladb-node-macos
          - os: windows-latest
            artifact: taladb-node-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-node-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native module
        working-directory: packages/taladb-node
        run: pnpm build

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/taladb-node/*.node
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — CLI binary
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build — CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust-check

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: taladb-linux-x86_64
            bin: taladb
          - os: macos-latest
            artifact: taladb-macos-aarch64
            bin: taladb
          - os: windows-latest
            artifact: taladb-windows-x86_64
            bin: taladb.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cli-

      - name: Build CLI (release)
        run: cargo build -p taladb-cli --release

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.bin }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build — taladb TypeScript package (tsup)
  # ---------------------------------------------------------------------------
  build-taladb:
    name: Build — taladb (TS)
    runs-on: ubuntu-latest
    needs: ts-check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        working-directory: packages/taladb
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/taladb
        run: ls dist/index.mjs dist/index.js dist/index.d.ts dist/index.react-native.mjs

  # ---------------------------------------------------------------------------
  # Test + Build — @taladb/react hooks package
  # ---------------------------------------------------------------------------
  build-taladb-react:
    name: Build — @taladb/react (TS)
    runs-on: ubuntu-latest
    needs: ts-check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Unit + integration tests
        working-directory: packages/taladb-react
        run: pnpm test

      - name: Build
        working-directory: packages/taladb-react
        run: pnpm exec tsup

      - name: Verify dist/ output
        working-directory: packages/taladb-react
        run: ls dist/index.mjs dist/index.js dist/index.d.ts

  # ---------------------------------------------------------------------------
  # Publish gate — all jobs must pass before anything can be published.
  # Use this job as the required status check in branch protection rules
  # and as the `needs:` dependency in any publish/release workflow.
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI — all checks passed
    runs-on: ubuntu-latest
    needs:
      - rust-check
      - ts-check
      - validate-cloudflare
      - build-wasm
      - build-node
      - build-cli
      - build-taladb
      - build-taladb-react
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed — safe to publish."
