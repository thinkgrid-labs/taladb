name: Feature request
description: Propose a new feature or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that TalaDB doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see — API shape, behaviour, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered.

  - type: dropdown
    id: runtime
    attributes:
      label: Relevant runtime(s)
      multiple: true
      options:
        - Browser (WASM)
        - Node.js
        - React Native
        - All / core
