<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <style>
      .text-zero { 
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        font-size: 115px; 
        font-weight: 800; 
        fill: #0f172a; 
        letter-spacing: -2px;
      }
      .text-db { 
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        font-size: 115px; 
        font-weight: 900; 
        fill: url(#rustGrad); 
        letter-spacing: -2px;
      }
      /* Automatically adapts the 'Zero' text to white in dark mode */
      @media (prefers-color-scheme: dark) {
        .text-zero { fill: #f8fafc; }
      }
    </style>
  </defs>

  <g transform="translate(60, 40)">
    <ellipse cx="80" cy="130" rx="65" ry="24" fill="none" stroke="url(#webGrad)" stroke-width="15"/>
    <ellipse cx="80" cy="85" rx="65" ry="24" fill="none" stroke="url(#webGrad)" stroke-width="15"/>
    <ellipse cx="80" cy="40" rx="65" ry="24" fill="none" stroke="url(#webGrad)" stroke-width="15"/>
    
    <line x1="15" y1="160" x2="145" y2="10" stroke="url(#rustGrad)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <text x="250" y="155">
    <tspan class="text-zero">Zero</tspan><tspan class="text-db">DB</tspan>
  </text>
</svg>
