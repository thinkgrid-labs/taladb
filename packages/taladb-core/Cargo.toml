[package]
name = "taladb-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "TalaDB core: embedded local-first document database powered by redb"

[dependencies]
redb       = "2.1"
postcard   = { version = "1.0", features = ["alloc"] }
serde      = { version = "1.0", features = ["derive"] }
ulid       = { version = "1.1", features = ["serde"] }
thiserror  = "1.0"
regex      = { version = "1.11", default-features = false, features = ["std", "unicode-perl"] }
# Encryption optional deps — only pulled in when `encryption` feature is enabled.
aes-gcm          = { version = "0.10", optional = true }
rand             = { version = "0.8",  optional = true }
pbkdf2           = { version = "0.12", optional = true }
hmac             = { version = "0.12", optional = true }
sha2             = { version = "0.10", optional = true }
zeroize          = { version = "1.7",  optional = true, features = ["derive"] }
# HNSW approximate nearest-neighbor index — opt-in via `vector-hnsw` feature.
# Pure Rust, WASM-compatible, MIT license.
instant-distance = { version = "0.6", optional = true }
# Config parsing — YAML and JSON config file support.
serde_json = "1.0"
serde_yaml = "0.9"
# URL validation in config (lightweight, no extra TLS deps).
url = "2.5"
# HTTP push sync — only pulled in when the `sync-http` feature is enabled.
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"], optional = true }

[features]
encryption   = ["dep:aes-gcm", "dep:rand", "dep:pbkdf2", "dep:hmac", "dep:sha2", "dep:zeroize"]
vector-hnsw  = ["dep:instant-distance"]
sync-http    = ["dep:reqwest"]

[dev-dependencies]
tempfile = "3.10"
wiremock = "0.6"
tokio    = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
zeroize  = { version = "1.7", features = ["derive"] }
