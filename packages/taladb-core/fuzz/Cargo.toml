[package]
name = "taladb-core-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
postcard = { version = "1.0", features = ["alloc"] }
taladb-core = { path = "..", features = ["encryption"] }

# Prevent the fuzzer from being built as part of the workspace.
[[bin]]
name = "fuzz_snapshot"
path = "fuzz_targets/fuzz_snapshot.rs"
test = false
doc = false

[[bin]]
name = "fuzz_filter"
path = "fuzz_targets/fuzz_filter.rs"
test = false
doc = false
