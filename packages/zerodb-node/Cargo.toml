[package]
name = "zerodb-node"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "ZeroDB Node.js native module (napi-rs)"

[lib]
crate-type = ["cdylib"]

[dependencies]
zerodb-core = { path = "../zerodb-core" }
napi = { version = "2.16", features = ["async", "serde-json"] }
napi-derive = "2.16"
serde_json = "1.0"
tokio = { version = "1.28", features = ["full"] }

[build-dependencies]
napi-build = "2.1"
