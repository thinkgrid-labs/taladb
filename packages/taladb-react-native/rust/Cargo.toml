[package]
name = "taladb-ffi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "TalaDB C FFI layer for React Native JSI"

[lib]
name = "taladb_ffi"
# staticlib  → linked into iOS .app (lipo'd universal .a)
# cdylib     → loaded by Android as libtaladb_ffi.so
crate-type = ["staticlib", "cdylib"]

[dependencies]
taladb-core = { path = "../../taladb-core", features = ["sync-http"] }
serde_json   = "1.0"
