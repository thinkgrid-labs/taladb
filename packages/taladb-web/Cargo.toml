[package]
name = "taladb-web"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "TalaDB browser WASM bindings (wasm-bindgen + OPFS) and Cloudflare Workers"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
taladb-core = { path = "../taladb-core" }
redb = "2.1"
wasm-bindgen = "0.2"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
getrandom = { version = "0.3", features = ["wasm_js"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"

[dependencies.web-sys]
version = "0.3"
features = [
  "Window",
  "Navigator",
  "Storage",
  "StorageManager",
  "File",
  "FileSystemDirectoryHandle",
  "FileSystemFileHandle",
  "FileSystemGetFileOptions",
  "FileSystemSyncAccessHandle",
  "FileSystemWritableFileStream",
]

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json"] }

[features]
# Build a WASM bundle without OPFS/browser APIs for Cloudflare Workers.
# Excludes openWithOpfs, FileSystemSyncAccessHandle imports, and reqwest.
cf-workers = []

[dev-dependencies]
wasm-bindgen-test = "0.3"
