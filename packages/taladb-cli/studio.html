<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalaDB Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111113;
  --surface: #18181b;
  --surface2: #202024;
  --border: #2c2c30;
  --text: #e4e4e7;
  --muted: #71717a;
  --accent: #B54B31;
  --accent-h: #c95837;
  --danger: #ef4444;
  --danger-h: #dc2626;
  --success: #22c55e;
  --r: 5px;
  --mono: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace;
  --sans: system-ui, -apple-system, sans-serif;
  --sidebar-w: 228px;
  --detail-w: 360px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.5; }

/* ── App shell ───────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; }

header {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; height: 44px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; user-select: none;
}
.logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; flex-shrink: 0; }
.logo svg { flex-shrink: 0; }
.db-badge {
  font-size: 11px; font-family: var(--mono); color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 20px; max-width: 360px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.spacer { flex: 1; }
.hdr-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: var(--r); display: flex; align-items: center; }
.hdr-btn:hover { color: var(--text); background: var(--surface2); }

/* ── Layout ──────────────────────────────────────────────────── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.sidebar-hdr {
  padding: 10px 14px 8px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#col-list { list-style: none; overflow-y: auto; flex: 1; padding: 4px 0; }
#col-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; cursor: pointer; transition: background 0.1s; gap: 8px;
}
#col-list li:hover { background: var(--surface2); }
#col-list li.active { background: color-mix(in srgb, var(--accent) 14%, transparent); }
#col-list li.active .col-name { color: var(--accent); font-weight: 600; }
.col-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.col-count { font-size: 11px; color: var(--muted); flex-shrink: 0; font-family: var(--mono); }
#col-list li.active .col-count { color: color-mix(in srgb, var(--accent) 70%, transparent); }
.sidebar-empty { padding: 14px; font-size: 12px; color: var(--muted); }

/* ── Main area ───────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }

/* ── Empty state ─────────────────────────────────────────────── */
#empty-state {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; color: var(--muted);
}
#empty-state svg { opacity: 0.25; }
#empty-state p { font-size: 14px; }

/* ── Table view ──────────────────────────────────────────────── */
#table-view {
  position: absolute; inset: 0; display: none;
  flex-direction: column; overflow: hidden;
}
#table-view.visible { display: flex; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.col-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 4px; }
.doc-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
.flex1 { flex: 1; }
.search-wrap { position: relative; flex-shrink: 0; }
.search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#search {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text); padding: 5px 10px 5px 30px; font-size: 12px; width: 200px; outline: none;
  font-family: var(--sans);
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

button {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text); padding: 5px 11px; font-size: 12px; cursor: pointer;
  white-space: nowrap; font-family: var(--sans); transition: background 0.1s, border-color 0.1s;
}
button:hover { background: var(--border); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
button.danger:hover:not(:disabled) { background: var(--danger); color: #fff; border-color: var(--danger); }

/* Table */
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead { position: sticky; top: 0; background: var(--surface); z-index: 5; }
th {
  padding: 8px 12px; text-align: left; font-weight: 600; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted);
  border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none;
}
td { padding: 7px 12px; border-bottom: 1px solid var(--border); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr { cursor: pointer; }
tr:hover td { background: var(--surface2); }
tr.selected td { background: color-mix(in srgb, var(--accent) 9%, transparent); }
td.id-cell { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.v-null { color: var(--muted); font-style: italic; }
.v-bool { color: #60a5fa; }
.v-num  { color: #86efac; }
.v-str  { color: #fca5a5; }
.v-arr, .v-obj { color: var(--muted); font-style: italic; }
.row-del { padding: 2px 7px; font-size: 10px; opacity: 0; pointer-events: none; border-radius: 3px; }
tr:hover .row-del { opacity: 1; pointer-events: auto; }

/* Pagination bar */
.pager {
  display: flex; align-items: center; gap: 10px; padding: 7px 14px;
  border-top: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; font-size: 12px; color: var(--muted);
}
.pager .flex1 { flex: 1; }
.pager button { padding: 3px 9px; font-size: 11px; }
.pager-info { font-variant-numeric: tabular-nums; }

/* ── Detail panel ────────────────────────────────────────────── */
#detail {
  width: var(--detail-w); min-width: var(--detail-w); background: var(--surface);
  border-left: 1px solid var(--border);
  display: none; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
#detail.open { display: flex; }
.detail-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.detail-hdr-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.detail-hdr button { padding: 2px 7px; font-size: 11px; }
#detail-json {
  flex: 1; overflow: auto; padding: 14px; font-family: var(--mono); font-size: 11.5px;
  line-height: 1.65; white-space: pre; color: var(--text); tab-size: 2;
}
.detail-foot { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; flex-shrink: 0; }

/* ── Toast ───────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 8px 16px; font-size: 12px;
  z-index: 9999; opacity: 0; transition: opacity 0.15s; pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.ok { border-color: var(--success); color: var(--success); }
#toast.err { border-color: var(--danger); color: var(--danger); }

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M3 5v14c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/>
        <path d="M3 12c0 1.657 4.03 3 9 3s9-1.343 9-3"/>
      </svg>
      TalaDB Studio
    </div>
    <div class="db-badge" id="db-badge">—</div>
    <div class="spacer"></div>
    <button class="hdr-btn" id="refresh-all" title="Refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    </button>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-hdr">Collections</div>
      <ul id="col-list"></ul>
    </aside>

    <!-- Main -->
    <div id="main">
      <!-- Empty state -->
      <div id="empty-state">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M3 5v14c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/>
          <path d="M3 12c0 1.657 4.03 3 9 3s9-1.343 9-3"/>
        </svg>
        <p>Select a collection to browse documents</p>
      </div>

      <!-- Table view -->
      <div id="table-view">
        <div class="toolbar">
          <span class="col-title" id="col-title"></span>
          <span class="doc-count" id="doc-count"></span>
          <div class="flex1"></div>
          <div class="search-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" id="search" placeholder="Filter documents…">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="t-head"></thead>
            <tbody id="t-body"></tbody>
          </table>
        </div>
        <div class="pager" id="pager"></div>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="detail">
      <div class="detail-hdr">
        <span class="detail-hdr-title">Document</span>
        <button id="close-detail">✕</button>
      </div>
      <pre id="detail-json"></pre>
      <div class="detail-foot">
        <button class="danger" id="detail-del">Delete document</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  collections: [],
  selected: null,     // current collection name
  docs: [],           // documents on the current page
  total: 0,
  page: 1,
  pages: 1,
  perPage: 50,
  search: '',
  activeDoc: null,    // document shown in the detail panel
};

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const colList     = $('col-list');
const emptyState  = $('empty-state');
const tableView   = $('table-view');
const tHead       = $('t-head');
const tBody       = $('t-body');
const pager       = $('pager');
const colTitle    = $('col-title');
const docCount    = $('doc-count');
const searchEl    = $('search');
const detail      = $('detail');
const detailJson  = $('detail-json');
const dbBadge     = $('db-badge');

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path) {
  const res = await fetch(path, { method });
  const data = await res.json().catch(() => ({ error: res.statusText }));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, kind = 'ok') {
  const el = $('toast');
  el.textContent = msg;
  el.className = `show ${kind}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Collections ───────────────────────────────────────────────────────────────
async function loadCollections() {
  try {
    const data = await api('GET', '/api/collections');
    S.collections = data.collections || [];
    dbBadge.textContent = data.db || '';
    dbBadge.title = data.db || '';
    renderSidebar();
  } catch (e) {
    toast('Failed to load collections: ' + e.message, 'err');
  }
}

function renderSidebar() {
  colList.innerHTML = '';
  if (!S.collections.length) {
    colList.innerHTML = '<li class="sidebar-empty">No collections found</li>';
    return;
  }
  for (const col of S.collections) {
    const li = document.createElement('li');
    if (col.name === S.selected) li.classList.add('active');
    li.innerHTML =
      `<span class="col-name">${esc(col.name)}</span>` +
      `<span class="col-count">${fmt(col.count)}</span>`;
    li.addEventListener('click', () => selectCollection(col.name));
    colList.appendChild(li);
  }
}

// ── Documents ─────────────────────────────────────────────────────────────────
async function selectCollection(name) {
  S.selected = name;
  S.page = 1;
  S.search = '';
  S.activeDoc = null;
  searchEl.value = '';
  closeDetail();
  renderSidebar();
  await loadDocs();
}

async function loadDocs() {
  if (!S.selected) return;
  emptyState.style.display = 'none';
  tableView.classList.add('visible');
  tBody.innerHTML = `<tr><td colspan="99" style="padding:24px;text-align:center;color:var(--muted)">Loading…</td></tr>`;

  try {
    const url = `/api/collections/${encodeURIComponent(S.selected)}/documents?page=${S.page}&per_page=${S.perPage}`;
    const data = await api('GET', url);
    S.docs  = data.documents || [];
    S.total = data.total  || 0;
    S.page  = data.page   || 1;
    S.pages = data.pages  || 1;
    renderTable();
    renderPager();
    colTitle.textContent = S.selected;
    docCount.textContent = `(${fmt(S.total)} doc${S.total !== 1 ? 's' : ''})`;
  } catch (e) {
    tBody.innerHTML = `<tr><td colspan="99" style="padding:20px;color:var(--danger)">${esc(e.message)}</td></tr>`;
  }
}

// ── Table rendering ───────────────────────────────────────────────────────────
function visibleDocs() {
  if (!S.search) return S.docs;
  const q = S.search.toLowerCase();
  return S.docs.filter(d => JSON.stringify(d).toLowerCase().includes(q));
}

function columns(docs) {
  const seen = new Set();
  seen.add('_id');
  for (const d of docs) {
    for (const k of Object.keys(d)) {
      if (k !== '_id') seen.add(k);
    }
  }
  return [...seen];
}

function renderTable() {
  const docs = visibleDocs();
  const cols = columns(S.docs.length ? S.docs : docs);

  // Header
  tHead.innerHTML = '<tr>' +
    cols.map(c => `<th>${esc(c)}</th>`).join('') +
    '<th style="width:40px"></th></tr>';

  // Body
  if (!docs.length) {
    tBody.innerHTML = `<tr><td colspan="99" style="padding:24px;text-align:center;color:var(--muted)">${S.search ? 'No matches' : 'Empty collection'}</td></tr>`;
    return;
  }

  tBody.innerHTML = docs.map(doc => {
    const id = doc._id || '';
    const sel = S.activeDoc && S.activeDoc._id === id ? ' class="selected"' : '';
    const cells = cols.map(col => {
      if (col === '_id') return `<td class="id-cell" title="${esc(id)}">${esc(shortId(id))}</td>`;
      return `<td title="${esc(strVal(doc[col]))}">${renderVal(doc[col])}</td>`;
    });
    cells.push(`<td><button class="row-del danger" data-id="${esc(id)}" title="Delete">✕</button></td>`);
    return `<tr${sel} data-id="${esc(id)}">${cells.join('')}</tr>`;
  }).join('');

  // Row interactions
  for (const tr of tBody.rows) {
    tr.addEventListener('click', e => {
      if (e.target.closest('.row-del')) return;
      const doc = docs.find(d => d._id === tr.dataset.id);
      if (doc) showDetail(doc);
    });
  }
  tBody.querySelectorAll('.row-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteDoc(btn.dataset.id);
    });
  });
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPager() {
  const from = S.total ? (S.page - 1) * S.perPage + 1 : 0;
  const to   = Math.min(S.page * S.perPage, S.total);
  pager.innerHTML =
    `<span class="pager-info">${from}–${to} of ${fmt(S.total)}</span>` +
    `<div class="flex1"></div>` +
    `<button id="prev-pg" ${S.page <= 1 ? 'disabled' : ''}>← Prev</button>` +
    `<span style="color:var(--muted);font-variant-numeric:tabular-nums">${S.page} / ${S.pages}</span>` +
    `<button id="next-pg" ${S.page >= S.pages ? 'disabled' : ''}>Next →</button>`;
  $('prev-pg')?.addEventListener('click', () => { S.page--; loadDocs(); });
  $('next-pg')?.addEventListener('click', () => { S.page++; loadDocs(); });
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function showDetail(doc) {
  S.activeDoc = doc;
  detail.classList.add('open');
  detailJson.textContent = JSON.stringify(doc, null, 2);
  // Highlight selected row
  for (const tr of tBody.rows) {
    tr.classList.toggle('selected', tr.dataset.id === doc._id);
  }
}

function closeDetail() {
  S.activeDoc = null;
  detail.classList.remove('open');
  for (const tr of tBody.rows) tr.classList.remove('selected');
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteDoc(id) {
  if (!S.selected) return;
  if (!confirm(`Delete document ${shortId(id)}?\n\nThis cannot be undone.`)) return;
  try {
    await api('DELETE', `/api/collections/${encodeURIComponent(S.selected)}/documents/${encodeURIComponent(id)}`);
    toast('Document deleted', 'ok');
    if (S.activeDoc && S.activeDoc._id === id) closeDetail();
    // Stay on same page, or step back if we just deleted the last doc on this page
    if (S.docs.length === 1 && S.page > 1) S.page--;
    await loadDocs();
    await loadCollections();
  } catch (e) {
    toast('Delete failed: ' + e.message, 'err');
  }
}

// ── Value display helpers ─────────────────────────────────────────────────────
function renderVal(v) {
  if (v === null || v === undefined) return '<span class="v-null">null</span>';
  if (typeof v === 'boolean') return `<span class="v-bool">${v}</span>`;
  if (typeof v === 'number')  return `<span class="v-num">${v}</span>`;
  if (typeof v === 'string') {
    const s = v.length > 72 ? v.slice(0, 72) + '…' : v;
    return `<span class="v-str">"${esc(s)}"</span>`;
  }
  if (Array.isArray(v)) return `<span class="v-arr">[${v.length}]</span>`;
  if (typeof v === 'object') return `<span class="v-obj">{${Object.keys(v).length}}</span>`;
  return esc(String(v));
}

function strVal(v) {
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'string') return v;
  return JSON.stringify(v);
}

function shortId(id) {
  if (!id || id.length <= 12) return id;
  return id.slice(0, 6) + '…' + id.slice(-4);
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(n) {
  return Number(n).toLocaleString();
}

// ── Event listeners ───────────────────────────────────────────────────────────
$('close-detail').addEventListener('click', closeDetail);

$('detail-del').addEventListener('click', () => {
  if (S.activeDoc) deleteDoc(S.activeDoc._id);
});

$('refresh-all').addEventListener('click', async () => {
  await loadCollections();
  if (S.selected) await loadDocs();
});

searchEl.addEventListener('input', e => {
  S.search = e.target.value;
  renderTable();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadCollections();
</script>
</body>
</html>
