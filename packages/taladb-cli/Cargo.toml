[package]
name = "taladb-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "TalaDB command-line dev tools (inspect, export, import)"

[[bin]]
name = "taladb"
path = "src/main.rs"

[dependencies]
taladb-core = { path = "../taladb-core" }
clap = { version = "4.5", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
